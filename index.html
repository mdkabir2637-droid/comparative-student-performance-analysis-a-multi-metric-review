<!DOCTYPE html>
<html>

<head>

<title>Student Performance Analysis</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Comparative Students Performance Analysis:A Multi-Metric Review</h1>

<h3>Group No:46</h3>

<p>
MD Kabir | Naman Kabra | Vedant Kailas Singare | Jeeva K.S
</p>

<h2>Enter Number of Students</h2>

<input type="number" id="numStudents">

<button onclick="createInputs()">
<div class="dashboard">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Topper</h3>
<p id="topperName">-</p>
</div>

<div class="card">
<h3>Class Average</h3>
<p id="classAverage">-</p>
</div>

</div>
Create Input Form
</button>

<div id="inputArea"></div>

<button onclick="generateResult()">
Generate Result
</button>

<h2>Result Table</h2>

<table id="resultTable"></table>

<h2>Topper & Lowest Performer</h2>

<p id="topper"></p>

<p id="lowest"></p>

<h2>Student Performance Graph</h2>

<canvas id="barChart"></canvas>

<h2>Grade Distribution</h2>

<canvas id="pieChart"></canvas>

<h2>Subject Average</h2>

<canvas id="subjectChart"></canvas>

<h2>Subject Difficulty</h2>

<p id="difficulty"></p>

<script src="script.js"></script>

</body>


</html>
