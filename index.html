<!DOCTYPE html>
<html>
<head>

<title>Comparative Student Performance Analysis: A Multi-Metric Review</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Comparative Student Performance Analysis:A Multi-Metric Review</h1>

<button onclick="toggleDark()">Dark Mode</button>

<br><br>

Enter Number of Students<br>
<input type="number" id="numStudents"><br>

<button onclick="createInputs()">Create Input Form</button><br>

<div id="inputs"></div>

<br>

<button onclick="generateResult()">Generate Result</button>

<br><br>

Search Student<br>
<input id="search" placeholder="Search name">

<table id="resultTable">

<thead>

<tr>
<th>Roll</th>
<th>Name</th>
<th>Percentage</th>
<th>CGPA</th>
<th>Grade</th>
</tr>

</thead>

<tbody></tbody>

</table>

<h2>Student Percentage Analysis</h2>
<canvas id="barChart"></canvas>

<h2>Grade Distribution</h2>
<canvas id="pieChart"></canvas>

<h2>Subject Average Marks Analysis</h2>
<canvas id="avgChart"></canvas>

<script src="script.js"></script>

</body>
</html>
