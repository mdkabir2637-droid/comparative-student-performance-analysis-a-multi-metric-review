<!DOCTYPE html>
<html>
<head>

<title>Student Performance Analysis</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Student Performance Analysis</h1>

<button onclick="toggleDark()">Dark Mode</button>

<br><br>

Number of Students
<input type="number" id="numStudents">

<button onclick="createInputs()">Create Input Form</button>

<div id="inputs"></div>

<br>

<button onclick="generateResult()">Generate Result</button>

<br><br>

Search Student
<input id="search" placeholder="Search name">

<table id="resultTable">

<thead>

<tr>
<th>Roll</th>
<th>Name</th>
<th>Percentage</th>
<th>CGPA</th>
<th>Grade</th>
</tr>

</thead>

<tbody></tbody>

</table>

<h2>Student Performance</h2>
<canvas id="barChart"></canvas>

<h2>Grade Distribution</h2>
<canvas id="pieChart"></canvas>

<h2>Subject Average</h2>
<canvas id="avgChart"></canvas>

<script src="script.js"></script>

</body>
</html>
