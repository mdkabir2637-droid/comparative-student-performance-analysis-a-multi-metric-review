<!DOCTYPE html>
<html>
<head>

<title>Student Performance Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Comparative Students Performance Analysis</h1>

<h3>Group 46</h3>
<p>MD Kabir | Naman Kabra | Vedant Kailas Singare | Jeeva K.S</p>

<h2>Enter Number of Students</h2>

<input type="number" id="numStudents">

<button onclick="createInputs()">Create Input Form</button>

<div id="inputArea"></div>

<br>

<button onclick="generateResult()">Generate Result</button>

<div class="tools">

<input type="text" id="search" placeholder="Search Student" onkeyup="searchStudent()">

<button onclick="darkMode()">🌙 Dark Mode</button>

</div>

<h2>Result Table</h2>

<table id="resultTable">

<tr>

<th>Name</th>
<th>Percentage</th>
<th>CGPA</th>
<th>Grade</th>

</tr>

</table>

<h2>Topper & Lowest Performer</h2>

<p id="topper"></p>

<h2>Student Performance Graph</h2>

<canvas id="barChart"></canvas>

<h2>Grade Distribution</h2>

<canvas id="pieChart"></canvas>

<h2>Subject Average Marks</h2>

<canvas id="avgChart"></canvas>

</div>

<script src="script.js"></script>

</body>

</html>
